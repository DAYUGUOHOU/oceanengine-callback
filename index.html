<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巨量引擎授权回调</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .success {
            color: #52c41a;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .code-box {
            background: #f5f5f5;
            border: 1px solid #d9d9d9;
            border-radius: 5px;
            padding: 15px;
            margin: 20px 0;
            word-break: break-all;
        }
        .code-label {
            font-weight: bold;
            color: #666;
            margin-bottom: 5px;
        }
        .code-value {
            font-family: "Courier New", monospace;
            font-size: 16px;
            color: #1890ff;
        }
        .info {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 5px;
            padding: 15px;
            margin: 20px 0;
        }
        .info-title {
            font-weight: bold;
            color: #0050b3;
            margin-bottom: 10px;
        }
        .steps {
            list-style: none;
            padding: 0;
        }
        .steps li {
            padding: 8px 0;
            color: #555;
        }
        .steps li:before {
            content: "✓ ";
            color: #52c41a;
            font-weight: bold;
        }
        .copy-btn {
            background: #1890ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        .copy-btn:hover {
            background: #40a9ff;
        }
        .error {
            color: #ff4d4f;
            background: #fff1f0;
            border: 1px solid #ffa39e;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 巨量引擎授权成功</h1>
        
        <div id="content">
            <p class="success">您已成功完成巨量引擎 Marketing API 授权！</p>
            
           <div class="info">
               <div class="info-title">📋 下一步操作：</div>
                <ul class="steps">
                    <li>复制下方的 <code>auth_code</code></li>
                    <li>运行项目中的 <code>get_token.py</code> 脚本</li>
                    <li>或使用 API 客户端代码换取 <code>access_token</code></li>
                    <li>将 <code>access_token</code> 填入 <code>config.py</code></li>
                </ul>
            </div>
            
            <div class="code-box">
               <div class="code-label">Auth Code:</div>
                <div class="code-value" id="auth-code">加载中...</div>
               <button class="copy-btn" onclick="copyCode()">📋 复制 Auth Code</button>
            </div>
            
            <div class="info">
                <strong>💡 提示：</strong> auth_code 有效期为 10 分钟，请尽快使用它换取 access_token。
            </div>
        </div>
        
        <div id="error-content" style="display: none;">
            <div class="error">
                <strong>⚠️ 授权失败</strong><br>
                未收到有效的 auth_code 参数，请检查授权流程是否正确。
            </div>
        </div>
    </div>

    <script>
        // 从 URL 参数中提取 auth_code
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        // 页面加载时处理
        window.onload = function() {
            const authCode = getQueryParam('auth_code');
            const state = getQueryParam('state');
            
            if (authCode) {
                document.getElementById('auth-code').textContent = authCode;
                
                // 保存到 localStorage（可选）
                localStorage.setItem('oceanengine_auth_code', authCode);
                localStorage.setItem('oceanengine_state', state || '');
            } else {
                document.getElementById('content').style.display = 'none';
                document.getElementById('error-content').style.display = 'block';
            }
        };
        
        // 复制功能
        function copyCode() {
            const code = document.getElementById('auth-code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ Auth Code 已复制到剪贴板！');
            }).catch(err => {
                // 降级方案
                const textArea = document.createElement('textarea');
                textArea.value = code;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('✅ Auth Code 已复制到剪贴板！');
            });
        }
    </script>
</body>
</html>
